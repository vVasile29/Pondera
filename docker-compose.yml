services:
  api:
    build: .
    environment:
      DATABASE_URL: sqlite:////data/optium.db
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - optium-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  web:
    build: ./frontend
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  optium-data:
